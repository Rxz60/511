<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الدراك الأسطوري</title>
    <style>
        :root {
            --gold: #dfb76c;
            --dark-gold: #b38f45;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.5s ease;
        }
        .welcome-card {
            background: var(--card-bg);
            border: 2px solid var(--gold);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 25px rgba(223, 183, 108, 0.3);
            max-width: 400px;
            width: 90%;
        }
        .welcome-card h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(223, 183, 108, 0.5);
        }
        .main-container {
            background: var(--card-bg);
            border: 1px solid rgba(223, 183, 108, 0.2);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .main-container h2 {
            text-align: center;
            color: var(--gold);
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-size: 0.9rem;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            transition: border 0.3s;
        }
        input:focus {
            border-color: var(--gold);
            outline: none;
        }
        .btn-gold {
            background: linear-gradient(45deg, var(--dark-gold), var(--gold));
            color: #121212;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(223, 183, 108, 0.2);
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(223, 183, 108, 0.4);
        }
    </style>
</head>
<body>

    <div class="overlay" id="welcomeOverlay">
        <div class="welcome-card">
            <h1>موقع ⚡️الدراك القوي </h1>
            <p>مرحباً بك. هذا الموقع مخصص لجمع معلومات التسجيل وعرضها للإدارة في السيرفر.</p>
            <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 25px;">بالدخول للموقع أنت توافق على مشاركة المعلومات العامة التالية معنا.</p>
            <button class="btn-gold" onclick="acceptAndEnter()">موافق ودخول</button>
        </div>
    </div>

    <div class="main-container" id="mainFormContainer">
        <h2>استمارة معلومات الأعضاء</h2>
        <form id="drakForm">
            <div class="form-group">
                <label for="userAvatar">رابط صورة حسابك (Avatar URL):</label>
                <input type="text" id="userAvatar" placeholder="ضع رابط صورتك هنا..." required>
            </div>
            <div class="form-group">
                <label for="userEmail">البريد الإلكتروني:</label>
                <input type="email" id="userEmail" placeholder="example@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="robloxUser">اسم حسابك في روبلوكس (Roblox Username):</label>
                <input type="text" id="robloxUser" placeholder="مثال: RobloxPlayer1" required>
            </div>
            <div class="form-group">
                <label for="discordUser">اسم حسابك في ديسكورد (Discord Username):</label>
                <input type="text" id="discordUser" placeholder="مثال: username" required>
            </div>
            <button type="submit" class="btn-gold">إرسال المعلومات للقروب</button>
        </form>
    </div>

    <script>
        function acceptAndEnter() {
            const overlay = document.getElementById('welcomeOverlay');
            const container = document.getElementById('mainFormContainer');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                container.style.display = 'block';
                setTimeout(() => { container.style.opacity = '1'; }, 50);
            }, 500);
        }

        document.getElementById('drakForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // امسح الرابط التجريبي بالأسفل وحط رابط البوت (Webhook) الجديد حقك بالكامل داخل علامات التنصيص ""
            const webhookURL = "https://discord.com/api/webhooks/1528062004420415751/ZjX35WlsUyYpfB8CjhUzzDAzIAJQxl6nCyu41yZf-YwKmxDMPgf3A5R_gWrupDmNLjX1";

            const avatar = document.getElementById('userAvatar').value;
            const email = document.getElementById('userEmail').value;
            const roblox = document.getElementById('robloxUser').value;
            const discord = document.getElementById('discordUser').value;

            const drakEmbed = {
                embeds: [{
                    title: "👑 عضو جديد تقدم بطلب تسجيل (موقع الدراك)",
                    color: 14661484,
                    thumbnail: { url: avatar.startsWith('http') ? avatar : 'https://i.imgur.com/wSTFkRM.png' },
                    fields: [
                        { name: "📧 البريد الإلكتروني:", value: email, inline: false },
                        { name: "🎮 حساب روبلوكس:", value: roblox, inline: true },
                        { name: "💬 حساب ديسكورد:", value: discord, inline: true }
                    ],
                    footer: { text: "نظام التحقق والتسجيل الخاص بالدراك" },
                    timestamp: new Date()
                }]
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(drakEmbed)
            })
            .then(response => {
                if (response.ok) {
                    alert('تم إرسال معلوماتك بنجاح إلى إدارة الدراك!');
                    document.getElementById('drakForm').reset();
                } else {
                    alert('حدث خطأ أثناء الإرسال، تأكد من صحة الرابط الجديد وسماحية الروم.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('فشل الاتصال بالخادم.');
            });
        });
    </script>
</body>
</html>
